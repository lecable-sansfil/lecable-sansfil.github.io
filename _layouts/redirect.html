<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <link rel="canonical" href="{{ page.redirect_url }}">
    <meta http-equiv="refresh" content="0; url={{ page.redirect_url }}">
    <script type="text/javascript">
        window.location.href = "{{ page.redirect_url }}"
    </script>
</head>
<body>
    <p>
        If you are not redirected, <a href="{{ page.redirect_url }}">click here</a>.
    </p>
    <p>
        {{ content }}
    </p>
</body>
</html>
